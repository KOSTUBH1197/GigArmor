version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: gigarmor-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: gigarmor
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - gigarmor-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigarmor-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/gigarmor?authSource=admin
      JWT_SECRET: your_super_secret_jwt_key_here
      AI_SERVICE_URL: http://ai-service:8000
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - ai-service
    networks:
      - gigarmor-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: gigarmor-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - gigarmor-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigarmor-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - gigarmor-network

volumes:
  mongodb_data:

networks:
  gigarmor-network:
    driver: bridge